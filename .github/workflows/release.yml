name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  build-mac:
    name: Build macOS DMG
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Bundle Python Runtime
        run: npm run bundle-python
        env:
          PYTHON_BIN: python3.13

      - name: Compile TypeScript + Frontend
        run: npx tsc && npx vite build

      - name: Build app bundles (no DMG yet)
        run: |
          npx electron-builder --mac dir --arm64
          npx electron-builder --mac dir --x64
        env:
          PYTHON_BIN: python3.13
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign app bundles
        run: |
          find release -name "*.app" -maxdepth 3 -type d | while read app; do
            echo "Signing: $app"
            codesign --force --deep --sign - "$app"
            codesign --verify --deep --strict "$app" && echo "✓ Valid" || echo "⚠ Issue with $app"
          done

      - name: Package signed apps into DMGs
        run: |
          find release -name "*.app" -maxdepth 3 -type d | while read app; do
            echo "Packaging DMG for: $app"
            npx electron-builder --mac dmg --prepackaged "$app"
          done
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Build
        run: |
          echo "=== Release files ==="
          find release -name "*.dmg" -o -name "*.app" -maxdepth 4 | head -20
          echo "=== Codesign check on apps ==="
          find release -name "*.app" -maxdepth 3 -type d | while read app; do
            codesign -dv "$app" 2>&1 | grep -E "Authority|TeamID|Identifier|Format" || echo "(ad-hoc) $app"
          done

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows NSIS
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npm run electron:build:win
        env:
          PYTHON_BIN: python
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux AppImage & deb
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Build AppImage & deb
        run: npm run electron:build:linux
        env:
          PYTHON_BIN: python3.13
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
