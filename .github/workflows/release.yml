name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  build-mac:
    name: Build macOS DMG
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Bundle Python Runtime
        run: npm run bundle-python
        env:
          PYTHON_BIN: python3.13

      - name: Build DMG
        run: npm run electron:build:dmg
        env:
          PYTHON_BIN: python3.13
          # For unsigned builds, we need to disable gatekeeper checks locally
          # but apps from GitHub Actions need proper notarization for distribution
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Build
        run: |
          ls -la release/
          # Check if the app bundle was created
          if [ -d "release/mac-*/Local NotebookLM.app" ]; then
            echo "App bundle created successfully"
            # List the contents of Resources to verify Python is included
            find release -name "python-packages" -type d | head -5
            find release -name "python-runtime" -type d | head -5
          fi

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows NSIS
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npm run electron:build:win
        env:
          PYTHON_BIN: python
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux AppImage & deb
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Build AppImage & deb
        run: npm run electron:build:linux
        env:
          PYTHON_BIN: python3.13
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
