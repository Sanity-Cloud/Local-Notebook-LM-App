name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Build DMG
        run: npm run electron:build:dmg -- --publish never
        env:
          PYTHON_BIN: python3.13
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ github.ref_name }}
          path: release/**/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows NSIS
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npm run electron:build:win -- --publish never
        env:
          # On Windows, setup-python exposes Python as 'python'
          PYTHON_BIN: python
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ github.ref_name }}
          path: release/**/*.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux AppImage & deb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Build AppImage & deb
        run: npm run electron:build:linux -- --publish never
        env:
          PYTHON_BIN: python3.13

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ github.ref_name }}
          path: |
            release/**/*.AppImage
            release/**/*.deb
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
