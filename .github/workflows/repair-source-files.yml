name: Repair source files

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/repair-source-files.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Repair processor.py, App.tsx, and cleanup shims
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def write_if_changed(path: str, text: str):
              p = Path(path)
              old = p.read_text(encoding='utf-8') if p.exists() else None
              if old != text:
                  p.write_text(text, encoding='utf-8')

          # 1. Repair processor.py directly.
          processor = Path('local_notebooklm/processor.py')
          s = processor.read_text(encoding='utf-8')
          s = s.replace(
              'from openai import OpenAI`nfrom .tts_providers import resolve_tts_provider',
              'from openai import OpenAI\nfrom .tts_providers import resolve_tts_provider',
          )
          s = s.replace('provider=\\"voicebox\\"', 'provider="voicebox"')
          s = s.replace('provider=\\\\"voicebox\\\\"', 'provider="voicebox"')
          s = s.replace(
              'tts_config = resolve_tts_provider(provider="voicebox"); kokoro_client = OpenAI(base_url=tts_config.base_url, api_key=tts_config.api_key)  # Kokoro API',
              'tts_config = resolve_tts_provider(provider="voicebox", base_url=__import__("os").environ.get("TTS_API_URL") or None, model=__import__("os").environ.get("TTS_MODEL") or None, api_key=__import__("os").environ.get("TTS_API_KEY") or None)\n    kokoro_client = OpenAI(base_url=tts_config.base_url, api_key=tts_config.api_key)  # Local TTS API',
          )
          if '`n' in s:
              s = s.replace('`n', '\n')
          processor.write_text(s, encoding='utf-8')

          # 2. Repair App.tsx directly by removing literal PowerShell newline text.
          app = Path('src/App.tsx')
          s = app.read_text(encoding='utf-8')
          s = s.replace('`r`n', '\n')
          s = s.replace('`n', '\n')
          if "ttsProvider: '" not in s:
              s = s.replace(
                  "    ttsVoiceModel: 'alloy',\n    speakerVoices:",
                  "    ttsVoiceModel: 'alloy',\n    ttsProvider: 'voicebox',\n    speakerVoices:",
              )
          s = s.replace(
              "    ttsApiUrl: 'http://localhost:8880/v1',",
              "    ttsApiUrl: 'http://127.0.0.1:17493/v1',",
          )
          app.write_text(s, encoding='utf-8')

          # 3. Restore make_audio.py to import processor directly.
          make_audio = Path('local_notebooklm/make_audio.py')
          s = make_audio.read_text(encoding='utf-8')
          s = s.replace('from .processor_bootstrap import generate_audio', 'from .processor import generate_audio')
          make_audio.write_text(s, encoding='utf-8')

          # 4. Remove runtime DOM cleanup shim from main.tsx.
          write_if_changed('src/main.tsx', """import React from 'react'\nimport ReactDOM from 'react-dom/client'\nimport App from './App'\nimport './index.css'\n\nReactDOM.createRoot(document.getElementById('root')!).render(\n  <React.StrictMode>\n    <App />\n  </React.StrictMode>,\n)\n""")

          # 5. Delete compatibility bootstrap after processor.py is repaired.
          bootstrap = Path('local_notebooklm/processor_bootstrap.py')
          if bootstrap.exists():
              bootstrap.unlink()

          # 6. Delete this one-shot workflow.
          workflow = Path('.github/workflows/repair-source-files.yml')
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit repaired source files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source repairs needed."
          else
            git commit -m "Repair processor and app source files directly"
            git push
          fi
# trigger: 2
